name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Ejecutar tests
        run: npm run test:web
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}

      - name: Subir allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 1

      - name: Subir test-results en fallo
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  deploy-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar allure-results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar allure-commandline
        run: npm install -g allure-commandline

      - name: Generar reporte Allure
        run: allure generate allure-results --clean -o allure-report

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir reporte a Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
